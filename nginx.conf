server {
        listen 80;
        server_name theo-von.com *.theo-von.com;

        return 301 https://$host$request_uri;
}

server {
        listen 443 ssl http2;
        server_name theo-von.com *.theo-von.com 192.168.1.113;

        ssl_certificate /etc/nginx/ssl/theo-von.pem;
        ssl_certificate_key /etc/nginx/ssl/theo-von.key;

        # --- SSL optimizations ---
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # --- Compression ---
        gzip on;
        gzip_comp_level 5;
        gzip_min_length 256;

        gzip_types
                text/plain
                text/css
                application/json
                application/javascript
                text/xml
                application/xml
                application/xml+rss
                text/javascript
                image/svg+xml;

        # ==========================================
        # API -> FastAPI container
        # ==========================================
        location /api/ {
        proxy_pass http://127.0.0.1:7000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # important for cookies/session auth
        proxy_set_header Cookie $http_cookie;

        # don't break streaming or auth responses
        proxy_buffering off;
        }

        # ==========================================
        # Next.js frontend
        # ==========================================
        location / {
                proxy_pass http://127.0.0.1:3000;

                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";

                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Disable buffering for streaming/Suspense
                proxy_buffering off;
        }
}